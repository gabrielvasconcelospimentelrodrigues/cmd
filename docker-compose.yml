# Redis local para a fila BullMQ (dev). Leve e suficiente para a VPS também.
# Subir:  docker compose up -d
# Parar:  docker compose down
services:
  redis:
    image: redis:7-alpine
    container_name: cmd-redis
    # Senha via env REDIS_PASSWORD (fica no .env ao lado, NUNCA no git). Se
    # vazia (dev local), sobe sem senha. appendonly: persiste a fila em disco.
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    command: sh -c 'redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction ${REDIS_PASSWORD:+--requirepass "$$REDIS_PASSWORD"}'
    ports:
      # SÓ localhost — NUNCA expor o Redis na internet (evita sequestro/replica
      # maliciosa: um Redis 6379 aberto sem senha pode ser transformado em réplica
      # de um atacante via SLAVEOF, quebrando as filas e vazando dados).
      - '127.0.0.1:6379:6379'
    volumes:
      - cmd-redis-data:/data
    restart: unless-stopped

volumes:
  cmd-redis-data:
