# Redis local para a fila BullMQ (dev). Leve e suficiente para a VPS também.
# Subir:  docker compose up -d
# Parar:  docker compose down
services:
  redis:
    image: redis:7-alpine
    container_name: cmd-redis
    # appendonly: persiste a fila em disco (não perde jobs em restart).
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    ports:
      - '6379:6379'
    volumes:
      - cmd-redis-data:/data
    restart: unless-stopped

volumes:
  cmd-redis-data:
